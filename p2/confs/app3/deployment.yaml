apiVersion: v1
kind: ConfigMap
metadata:
  name: app-three-html
data:
  index.html: |
    <html>
      <body><h1>App Three</h1></body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-three
  labels:
    app: app-three
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-three
  template:
    metadata:
      labels:
        app: app-three
    spec:
      volumes:
        - name: html
          configMap:
            name: app-three-html
      containers:
      - name: app-three
        image: nginx:1.14.2
        volumeMounts:
          - name: html
            mountPath: /usr/share/nginx/html
        ports:
        - containerPort: 80
